<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      width: 360px;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }

    .top {
      display: flex;
      justify-content: space-between; /* Pushes items to opposite edges */
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .photo img {
      width: 220px; /* Increased image size */
      height: 244px; /* Increased to maintain proportion */
      object-fit: cover;
      border-radius: 12px;
    }

    /* Updated Right Panel Layout */
    .right-panel {
      display: flex;
      flex-direction: row; 
      align-items: center; 
      justify-content: flex-end;
      gap: 12px;
      height: 244px; /* Matched to new image height to stay centered */
    }

    .social-icons {
      display: flex;
      flex-direction: column;
      gap: 12px; /* Slightly increased gap for the taller space */
    }

    .social-icons a {
      width: 38px;
      height: 38px;
      background: black;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .social-icons a svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    .panel-divider {
      width: 1px;
      height: 160px; /* Increased height to match taller icon stack */
      background: #e0e0e0;
      margin: 0 2px;
    }

    /* Container for Logo + Handle */
    .brand-cluster {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px; 
    }

    .logo-icon {
      width: 45px; 
      height: auto;
      fill: #27aae1; 
    }

    .handle {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-size: 11px;
      color: #888;
      text-align: center;
      letter-spacing: 1px;
    }

    /* Name section */
    .name-section {
      margin-bottom: 20px;
    }

    .name-section h1 {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 1.1;
    }

    .name-section h2 {
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 3px;
      color: #333;
    }

    .divider {
      width: 36px;
      height: 2px;
      background: black;
      margin: 10px 0;
    }

    /* Info rows */
    .info-row {
      display: flex;
      gap: 16px;
      margin-bottom: 14px;
      font-size: 14px;
    }

    .info-label {
      font-weight: 700;
      min-width: 65px;
    }

    .info-value {
      color: #333;
      line-height: 1.7;
    }

    .info-value a {
      color: #333;
      text-decoration: none;
    }

    /* Buttons */
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      display: block;
      text-align: center;
      padding: 14px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      letter-spacing: 0.5px;
      cursor: pointer;
    }

    .btn-outline {
      border: 2px solid black;
      color: black;
      background: white;
    }

    .btn-filled {
      background: black;
      color: white;
      border: 2px solid black;
    }

    /* Bottom logo */
    .bottom-logo {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid #e0e0e0;
      display: flex;
      justify-content: center;
    }

    .bottom-logo img {
      width: 290px;
      object-fit: contain;
    }
  </style>
</head>
